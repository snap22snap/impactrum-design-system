<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Impactrum — Premium LED, engineered for the spaces that demand it.</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-sans); }
    * { box-sizing: border-box; }
    a { text-decoration: none; }
    button { font-family: var(--font-sans); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="ui_kits/marketing/Photo.jsx"></script>
  <script type="text/babel" src="ui_kits/marketing/Nav.jsx"></script>
  <script type="text/babel" src="ui_kits/marketing/Hero.jsx"></script>
  <script type="text/babel" src="ui_kits/marketing/CategoryPills.jsx"></script>
  <script type="text/babel" src="ui_kits/marketing/FeatureGrid.jsx"></script>
  <script type="text/babel" src="ui_kits/marketing/ProductGrid.jsx"></script>
  <script type="text/babel" src="ui_kits/marketing/CaseStudies.jsx"></script>
  <script type="text/babel" src="ui_kits/marketing/InquiryTiers.jsx"></script>
  <script type="text/babel" src="ui_kits/marketing/CTABand.jsx"></script>
  <script type="text/babel" src="ui_kits/marketing/Footer.jsx"></script>
  <script type="text/babel">
    function App() {
      const [lang, setLang] = React.useState('EN');
      const [active, setActive] = React.useState('indoor');
      const [scrolled, setScrolled] = React.useState(false);
      const [sent, setSent] = React.useState(false);

      React.useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 4);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const onSend = () => {
        setSent(true);
        setTimeout(() => setSent(false), 2400);
      };

      return (
        <div data-screen-label="01 Home" className={lang === 'KO' ? 'lang-ko' : ''}>
          <Nav lang={lang} setLang={setLang} scrolled={scrolled} />
          <Hero lang={lang} />
          <FeatureGrid lang={lang} />
          <ProductGrid lang={lang} active={active} setActive={setActive} />
          <CaseStudies lang={lang} />
          <InquiryTiers lang={lang} sent={sent} onSend={onSend} />
          <CTABand lang={lang} />
          <Footer lang={lang} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
