<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Impactrum — Marketing UI kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-sans); }
    * { box-sizing: border-box; }
    a { text-decoration: none; }
    button { font-family: var(--font-sans); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Photo.jsx"></script>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="CategoryPills.jsx"></script>
  <script type="text/babel" src="FeatureGrid.jsx"></script>
  <script type="text/babel" src="ProductGrid.jsx"></script>
  <script type="text/babel" src="CaseStudies.jsx"></script>
  <script type="text/babel" src="InquiryTiers.jsx"></script>
  <script type="text/babel" src="CTABand.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel">
    function App() {
      const [lang, setLang] = React.useState('EN');
      const [active, setActive] = React.useState('indoor');
      const [scrolled, setScrolled] = React.useState(false);
      const [sent, setSent] = React.useState(false);

      React.useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 4);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const onSend = () => {
        setSent(true);
        setTimeout(() => setSent(false), 2400);
      };

      return (
        <div data-screen-label="01 Home" className={lang === 'KO' ? 'lang-ko' : ''}>
          <Nav lang={lang} setLang={setLang} scrolled={scrolled} />
          <Hero lang={lang} />
          <FeatureGrid lang={lang} />
          <ProductGrid lang={lang} active={active} setActive={setActive} />
          <CaseStudies lang={lang} />
          <InquiryTiers lang={lang} sent={sent} onSend={onSend} />
          <CTABand lang={lang} />
          <Footer lang={lang} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
