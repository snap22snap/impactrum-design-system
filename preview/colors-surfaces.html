<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { padding: 24px; }
  .card-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { width: 140px; border-radius: 8px; overflow: hidden; border: 1px solid var(--hairline); font-family: var(--font-sans); }
  .swatch .chip { height: 64px; }
  .swatch .meta { padding: 10px 12px; font-size: 12px; color: var(--fg-2); display: flex; flex-direction: column; gap: 2px; }
  .swatch .meta .name { color: var(--fg-1); font-weight: 600; }
  .swatch .meta .hex { color: var(--fg-3); font-variant-numeric: tabular-nums; }
  .swatch.bordered .chip { border-bottom: 1px solid var(--hairline); }
</style>
</head><body>
<div class="card-row">
  <div class="swatch bordered"><div class="chip" style="background:#ffffff"></div><div class="meta"><span class="name">Canvas</span><span class="hex">#ffffff</span></div></div>
  <div class="swatch"><div class="chip" style="background:#fbfaf6"></div><div class="meta"><span class="name">Surface warm</span><span class="hex">#fbfaf6</span></div></div>
  <div class="swatch"><div class="chip" style="background:#f6f8fa"></div><div class="meta"><span class="name">Surface cool</span><span class="hex">#f6f8fa</span></div></div>
  <div class="swatch"><div class="chip" style="background:#f7f8fa"></div><div class="meta"><span class="name">Surface soft</span><span class="hex">#f7f8fa</span></div></div>
  <div class="swatch"><div class="chip" style="background:#f5f5f5"></div><div class="meta"><span class="name">Surface card</span><span class="hex">#f5f5f5</span></div></div>
  <div class="swatch"><div class="chip" style="background:#e5e7eb"></div><div class="meta"><span class="name">Surface strong</span><span class="hex">#e5e7eb</span></div></div>
</div>
</body></html>
