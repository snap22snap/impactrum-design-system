<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { padding: 28px 32px; font-family: var(--font-sans); }
  .card {
    background: #fff; border: 1px solid var(--hairline);
    border-radius: 12px; padding: 24px; max-width: 520px;
  }
  h6 {
    margin: 0 0 0 0; padding: 0 0 14px 0;
    font-size: 16px; font-weight: 600; color: #111111;
    border-bottom: 1px solid #e5e7eb;
  }
  .row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 0; border-bottom: 1px solid #e5e7eb;
    font-size: 14px; line-height: 1.5;
    font-variant-numeric: tabular-nums;
  }
  .row:first-of-type { padding-top: 14px; }
  .row:last-child { border-bottom: 0; padding-bottom: 0; }
  .label { color: #111111; font-weight: 600; }
  .value { color: #1f2937; font-weight: 400; }
</style>
</head><body>
<div class="card">
  <h6>P1.2 Indoor LED · Specifications</h6>
  <div class="row"><span class="label">Pixel pitch</span><span class="value">1.2 mm</span></div>
  <div class="row"><span class="label">Brightness</span><span class="value">1,500 nits</span></div>
  <div class="row"><span class="label">Refresh rate</span><span class="value">3,840 Hz</span></div>
  <div class="row"><span class="label">Resolution (per panel)</span><span class="value">480 × 270</span></div>
  <div class="row"><span class="label">IP rating</span><span class="value">IP30 (front) / IP20 (rear)</span></div>
  <div class="row"><span class="label">Lifespan</span><span class="value">100,000 h</span></div>
</div>
</body></html>
