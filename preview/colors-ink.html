<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { padding: 24px; }
  .card-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch {
    width: 140px; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--hairline);
    font-family: var(--font-sans);
  }
  .swatch .chip { height: 64px; }
  .swatch .meta {
    padding: 10px 12px; font-size: 12px; color: var(--fg-2);
    display: flex; flex-direction: column; gap: 2px;
  }
  .swatch .meta .name { color: var(--fg-1); font-weight: 600; }
  .swatch .meta .hex { color: var(--fg-3); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
</style>
</head><body>
<div class="card-row">
  <div class="swatch"><div class="chip" style="background:#111111"></div><div class="meta"><span class="name">Primary / Ink</span><span class="hex">#111111</span></div></div>
  <div class="swatch"><div class="chip" style="background:#242424"></div><div class="meta"><span class="name">Primary active</span><span class="hex">#242424</span></div></div>
  <div class="swatch"><div class="chip" style="background:#374151"></div><div class="meta"><span class="name">Body</span><span class="hex">#374151</span></div></div>
  <div class="swatch"><div class="chip" style="background:#6b7280"></div><div class="meta"><span class="name">Muted</span><span class="hex">#6b7280</span></div></div>
  <div class="swatch"><div class="chip" style="background:#898989"></div><div class="meta"><span class="name">Muted soft</span><span class="hex">#898989</span></div></div>
</div>
</body></html>
