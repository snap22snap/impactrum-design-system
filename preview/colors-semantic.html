<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { padding: 24px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { width: 140px; border-radius: 8px; overflow: hidden; border: 1px solid var(--hairline); font-family: var(--font-sans); }
  .swatch .chip { height: 56px; }
  .swatch .meta { padding: 10px 12px; font-size: 12px; color: var(--fg-3); display: flex; flex-direction: column; gap: 2px; }
  .swatch .meta .name { color: var(--fg-1); font-weight: 600; }
  .swatch .meta .hex { font-variant-numeric: tabular-nums; }
</style>
</head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#10b981"></div><div class="meta"><span class="name">Success</span><span class="hex">#10b981</span></div></div>
  <div class="swatch"><div class="chip" style="background:#f59e0b"></div><div class="meta"><span class="name">Warning</span><span class="hex">#f59e0b</span></div></div>
  <div class="swatch"><div class="chip" style="background:#e8464d"></div><div class="meta"><span class="name">Error</span><span class="hex">#e8464d</span></div></div>
</div>
</body></html>
