<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { padding: 28px 32px; font-family: var(--font-sans); }
  .row { display: flex; gap: 22px; align-items: baseline; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; gap: 4px; }
  .glyph { font-size: 36px; line-height: 1; color: var(--fg-1); }
  .label { font-size: 11px; color: var(--fg-3); }
  .w-400 { font-weight: 400; }
  .w-500 { font-weight: 500; }
  .w-600 { font-weight: 600; }
  .w-700 { font-weight: 700; }
  .w-800 { font-weight: 800; }
</style>
</head><body>
<div class="row">
  <div class="item"><span class="glyph w-400">Aa 가</span><span class="label">400 · Regular</span></div>
  <div class="item"><span class="glyph w-500">Aa 가</span><span class="label">500 · Medium</span></div>
  <div class="item"><span class="glyph w-600">Aa 가</span><span class="label">600 · Semibold</span></div>
  <div class="item"><span class="glyph w-700">Aa 가</span><span class="label">700 · Bold</span></div>
  <div class="item"><span class="glyph w-800">Aa 가</span><span class="label">800 · Black</span></div>
</div>
</body></html>
