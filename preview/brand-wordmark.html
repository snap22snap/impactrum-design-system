<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { padding: 28px 32px; font-family: var(--font-sans); display: flex; align-items: center; justify-content: center; min-height: 90vh; }
  .lockup { display: flex; flex-direction: column; align-items: flex-start; gap: 14px; }
  .wordmark { height: 22px; }
  .wordmark img { height: 100%; width: auto; display: block; }
  .meta { font-size: 12px; color: var(--fg-3); font-family: var(--font-sans); }
</style>
</head><body>
<div class="lockup">
  <div class="wordmark"><img src="../assets/impactrum-logo-black-2026.svg" alt="Impactrum"></div>
  <div class="meta">Wordmark · always #111111 · min-width 96px · clear-space = cap height</div>
</div>
</body></html>
