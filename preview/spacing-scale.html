<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { padding: 28px 32px; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 14px; }
  .row + .row { margin-top: 12px; }
  .bar { background: #111; height: 14px; border-radius: 2px; }
  .label { width: 56px; font-size: 12px; color: var(--fg-1); font-weight: 600; font-variant-numeric: tabular-nums; }
  .px    { font-size: 11px; color: var(--fg-3); font-variant-numeric: tabular-nums; }
</style>
</head><body>
<div class="row"><span class="label">xxs</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
<div class="row"><span class="label">xs</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
<div class="row"><span class="label">sm</span><div class="bar" style="width:12px"></div><span class="px">12 px</span></div>
<div class="row"><span class="label">md</span><div class="bar" style="width:16px"></div><span class="px">16 px</span></div>
<div class="row"><span class="label">lg</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
<div class="row"><span class="label">xl</span><div class="bar" style="width:32px"></div><span class="px">32 px</span></div>
<div class="row"><span class="label">xxl</span><div class="bar" style="width:48px"></div><span class="px">48 px</span></div>
<div class="row"><span class="label">section</span><div class="bar" style="width:120px"></div><span class="px">120 px · between major bands</span></div>
</body></html>
